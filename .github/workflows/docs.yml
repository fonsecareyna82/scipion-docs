name: Deploy docs

on:
  push:
    branches: [ "devel" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Documentation version to publish"
        required: true
        default: "dev"
      aliases:
        description: "Optional aliases, separated by spaces"
        required: false
        default: ""
      set_default:
        description: "Set this version or alias as the default version"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate docs build
        run: mkdocs build --strict

      - name: Deploy development docs
        if: github.event_name == 'push'
        run: |
          mike deploy --push --update-aliases dev latest
          mike set-default --push latest

      - name: Deploy selected docs version
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ALIASES="${{ github.event.inputs.aliases }}"
          if [ -n "$ALIASES" ]; then
            mike deploy --push --update-aliases "$VERSION" $ALIASES
          else
            mike deploy --push "$VERSION"
          fi
          if [ "${{ github.event.inputs.set_default }}" = "true" ]; then
            mike set-default --push "$VERSION"
          fi
